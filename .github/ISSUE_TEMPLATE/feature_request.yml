name: Feature request
description: Propose a focused improvement to Lore.
title: "feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real traveler or operational problem needs to be solved?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe success without prescribing an implementation.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Curation, privacy, and release constraints
      description: Note camera, location, source, moderation, or App Store implications.
