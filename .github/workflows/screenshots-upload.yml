name: App Store · Upload Screenshots

# Uploads the pre-rendered marketing frames in fastlane/promo_screenshots to the
# App Store Connect listing via the ASC API (fastlane deliver, screenshots-only:
# no binary, no text metadata). Manual-only. Runs on Linux because it is a pure
# API call — no Xcode, no Simulator, 1x runner cost.

on:
  workflow_dispatch: {}

concurrency:
  group: app-store-screenshots-upload
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    environment: app-store-production
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Ruby + Fastlane (cached)
        uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b # v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Upload screenshots to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: bundle exec fastlane screenshots_upload

      - name: Save fastlane log on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deliver-log
          path: fastlane/report.xml
          if-no-files-found: ignore
          retention-days: 7
