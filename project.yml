# Lore — native iOS app (XcodeGen spec)
#
# Regenerate the Xcode project any time this file or the source tree changes:
#   xcodegen generate
#
# Constants locked in lore/docs/10-APPSTORE.md:
#   bundle id  com.erickdronski.lore   ·  team J9DMDH4S58  ·  iOS 17.0+
name: Lore

options:
  bundleIdPrefix: app.lore
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# ── Swift packages ───────────────────────────────────────────────────────────
# MapLibre GL Native, the locked production map engine (docs/17 §3, docs/22
# Half B). The native Lore map (LoreMapLibreView) matches the proprietary web
# restyle, ported from lore-web/lib/mapStyle.ts + map3d.ts. It ships behind
# Config.useMapLibreMap (default false) so MapKit stays the map until the
# founder compiles on device and flips the flag. The distribution repo below is
# the official prebuilt xcframework, no build-from-source needed.
packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: 6.0.0

settings:
  base:
    DEVELOPMENT_TEAM: J9DMDH4S58
    CODE_SIGN_STYLE: Automatic
    # Swift 5 language mode for P0. The AR threading model (docs/03 §2 — ARSession
    # lane / ResolverActor / network lane) is what earns the flip to Swift 6 strict
    # concurrency at P1; doing it now would fight the scaffold, not harden it.
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: true
    # apple-generic versioning so `agvtool` (fastlane increment_build_number) can
    # stamp a monotonic CFBundleVersion per CI run (see fastlane/Fastfile).
    VERSIONING_SYSTEM: apple-generic

targets:
  Lore:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Lore
      - path: Sources/Shared # types shared with the LoreWidget extension
    # The widget extension is embedded in the app bundle.
    dependencies:
      - target: LoreWidget
      # MapLibre GL Native (docs/17 §3). Behind Config.useMapLibreMap; MapKit
      # remains the default map until the founder verifies on device.
      - package: MapLibre
        product: MapLibre
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.erickdronski.lore
        PRODUCT_NAME: Lore
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon # Sources/Lore/Resources/Assets.xcassets/AppIcon.appiconset (1024px, no alpha)
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1" # iPhone only — Wi-Fi-only iPads can never localize (docs/10 §1)
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
        SUPPORTS_MACCATALYST: false

        # Sign in with Apple entitlement is READY at Sources/Lore/Lore.entitlements
        # but stays OFF until the App ID com.erickdronski.lore has the
        # "Sign in with Apple" capability enabled in the Apple Developer portal
        # AND the Supabase Apple provider is configured (Services ID + .p8 key).
        # Enabling it before the portal capability exists breaks cloud-managed
        # signing. Uncomment once both are provisioned:
        #   CODE_SIGN_ENTITLEMENTS: Sources/Lore/Lore.entitlements

        # ── Capabilities that REQUIRE the Apple Developer portal ───────────
        # These are entitlement-backed and can NOT be assumed from a spec file —
        # they must be enabled on the App ID `com.erickdronski.lore` in the portal (and
        # the matching provisioning profile regenerated) before a signed build
        # works. XcodeGen can emit the entitlement, but the portal is the source
        # of truth, so they are left COMMENTED here per the doctrine "don't
        # assume entitlements". Uncomment + create the .entitlements file on the
        # machine with Xcode once the App ID is configured.
        #
        # StoreKit (In-App Purchase) — docs/16 §1. No entitlement key is needed
        #   for StoreKit 2 itself; the IAP capability lives on the App ID + the
        #   Paid Apps agreement in App Store Connect. Nothing to add here beyond
        #   the products in App Store Connect + the local StoreKit/Lore.storekit.
        #
        # Sign in with Apple — docs/16 §2. Portal-gated entitlement:
        #   CODE_SIGN_ENTITLEMENTS: Sources/Lore/Lore.entitlements
        #   and in that file: com.apple.developer.applesignin = [Default]
        #
        # Push Notifications (APNs) — docs/16 §5. Portal-gated entitlement:
        #   in Lore.entitlements: aps-environment = development (→ production for
        #   release). Requires the Push capability on the App ID + an APNs .p8
        #   auth key. The UIBackgroundModes/remote-notification key above is the
        #   non-gated half and is set.
        #
        # App Groups (widget ⇄ app snapshot) — docs/16 §7. Portal-gated:
        #   in Lore.entitlements AND LoreWidget.entitlements:
        #   com.apple.security.application-groups = [group.com.erickdronski.lore]
        #   Until provisioned, LoreWidgetStore.sharedDefaults is nil and the
        #   widget falls back to its sample content (no crash).
        #
        # CODE_SIGN_ENTITLEMENTS: Sources/Lore/Lore.entitlements
      # Guarantee DEBUG is defined for the Debug config so the DEBUG-only
      # ScreenshotSupport hook compiles into the screenshot/test build (and is
      # excluded from Release/TestFlight). Explicit so it never rides on
      # XcodeGen's implicit preset.
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DEBUG"
    info:
      path: Sources/Lore/Info.plist
      properties:
        CFBundleDisplayName: Lore
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false

        # ── Live Activities (ActivityKit) ──────────────────────────────────
        # docs/16 §8 — the tour Live Activity + Dynamic Island. This Info.plist
        # key is the ONLY thing ActivityKit needs beyond the shared attributes
        # type; it is NOT a portal-gated capability (no entitlement), so it's
        # safe to enable now.
        NSSupportsLiveActivities: true

        # ── URL scheme (widget / Live Activity deep links) ─────────────────
        # `lore://place/{id}`, `lore://tour/{slug}`, `lore://map` — handled by
        # AppRouter.handleDeepLink via .onOpenURL (docs/16 §7/§8).
        CFBundleURLTypes:
          - CFBundleURLName: com.erickdronski.lore
            CFBundleURLSchemes:
              - lore

        # ── Purpose strings ─────────────────────────────────────────────────
        # Camera + location copy must match the release scanner and public
        # privacy policy. The optional cloud-identification frame is disclosed
        # before the permission is used, not hidden behind generic AR wording.
        NSCameraUsageDescription: "Lore uses your camera to position nearby stories in the live scanner. Live scanning stays on your device. If you choose Identify with Google, Lore asks before sending one current frame to Google Cloud Vision."
        NSLocationWhenInUseUsageDescription: "Your precise location lets Lore know which block you're standing on, so it can load the stories around you and place them accurately in AR."
        # Motion string drafted here (not yet in docs/10 — upstream it): compass
        # smoothing for the coarse scanner + card parallax (CMMotionManager).
        NSMotionUsageDescription: "Lore uses motion data to steady the compass, so nearby places stay pointed at the right spot as you move."

        # ── UIRequiredDeviceCapabilities — DELIBERATELY NOT SET AT P0 ──────
        # These keys are effectively irreversible once a build ships because
        # Apple restricts removing required capabilities in later updates.
        # Leave them unset for v1: the app has map fallbacks and does not ship
        # ARCore. Revisit only after the supported-device policy is approved.
        #
        # UIRequiredDeviceCapabilities:
        #   - arkit   # hides Lore from non-ARKit devices
        #   - gps     # excludes Wi-Fi-only iPads (no GNSS, can never localize)

  # ── Widget extension (docs/16 §7 WidgetKit + §8 Live Activities) ─────────
  # Release v1 vends only the active-tour Live Activity / Dynamic Island (an
  # ActivityConfiguration must live in a widget extension bundle). Nearby Lore
  # source remains compiled but is not included in LoreWidgetBundle until its
  # App Group is provisioned and real shared data is verified.
  LoreWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/LoreWidget
      - path: Sources/Shared # SAME shared types the app compiles
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.erickdronski.lore.LoreWidget
        PRODUCT_NAME: LoreWidget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: true
        # App Group entitlement is portal-gated — same note as the app target.
        # Both targets must carry `group.com.erickdronski.lore` for the snapshot hand-off
        # to resolve. Left commented until the App ID + group are provisioned.
        # CODE_SIGN_ENTITLEMENTS: Sources/LoreWidget/LoreWidget.entitlements
    info:
      # XcodeGen generates this plist from the properties below (overwriting the
      # hand-written Sources/LoreWidget/Info.plist on `xcodegen generate`). The
      # NSExtension point is what makes this a WidgetKit extension. Live
      # Activities need NSSupportsLiveActivities on the CONTAINING APP, not here.
      path: Sources/LoreWidget/Info.plist
      properties:
        CFBundleDisplayName: Lore
        CFBundleName: LoreWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  # ── UI-test target: App Store screenshot capturer (fastlane snapshot) ──────
  # DEBUG-only. Runs on the Simulator via `fastlane screenshots` (no code
  # signing needed). Drives the app past onboarding (the LORE_SCREENSHOTS launch
  # arg → ScreenshotSupport) and captures the non-camera surfaces. It is NEVER
  # archived and NEVER ships: the release "Lore" scheme below doesn't build it,
  # only the "LoreScreenshots" scheme's test action does.
  LoreUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/LoreUITests
    dependencies:
      - target: Lore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.erickdronski.lore.uitests
        TEST_TARGET_NAME: Lore
        # XcodeGen doesn't emit an Info.plist for this target, so let Xcode
        # synthesize one (without it the Simulator build fails: "target does not
        # have an Info.plist file"). Simulator tests need no real signing.
        GENERATE_INFOPLIST_FILE: YES

  # ── Unit-test target: the scanner's pure honesty math (footprint, tier
  # hysteresis, gaze, bearings). Hosted in the app so it can @testable import
  # Lore; built only for the test action, never archived/shipped.
  LoreTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/LoreTests
    dependencies:
      - target: Lore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.erickdronski.lore.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Lore.app/Lore"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  # Release scheme, archived + uploaded to TestFlight by `fastlane beta`.
  # Unchanged: it builds only the app + widget, never the UI-test target.
  Lore:
    build:
      targets:
        Lore: all
        LoreWidget: all
        LoreTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LoreTests
    archive:
      config: Release

  # Screenshot scheme, run by `fastlane screenshots` on the Simulator only.
  LoreScreenshots:
    build:
      targets:
        Lore: all
        LoreUITests: [test]
    test:
      config: Debug
      targets:
        - LoreUITests
    run:
      config: Debug
